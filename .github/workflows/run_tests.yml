name: Unit tests

on:
  push:
    branches:
      - master
      - android-10
  pull_request:
    branches:
      - master
      - android-10

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: "📥 Phase 1: Clone repository"
      uses: actions/checkout@v6
    - name: "☕ Phase 2: Setup Java 17"
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: "🧪 Phase 3: Execute unit tests"
      run: |
        echo "=========================================="
        echo "Running unit tests"
        echo "=========================================="
        ./gradlew test
        echo ""
        echo "=========================================="
        echo "TESTS COMPLETED"
        echo "=========================================="
